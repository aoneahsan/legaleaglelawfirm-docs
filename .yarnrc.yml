# node-modules linker (not PnP) — required for Docusaurus 3.10 + Node 26
# compatibility. Docusaurus's CJS-from-ESM internals trip the PnP loader's
# assertion check. node-modules is the documented workaround:
# https://yarnpkg.com/configuration/yarnrc#nodeLinker
nodeLinker: node-modules

enableGlobalCache: true
