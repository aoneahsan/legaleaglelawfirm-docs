name: Deploy docs to Firebase Hosting

# Mirrors GitHub Pages deploy to Firebase Hosting (legaleaglelaws-docs site).
# Requires repository secret FIREBASE_SERVICE_ACCOUNT_LEGALEAGLELAWS containing a
# JSON service-account key with the "Firebase Hosting Admin" role on the
# legaleaglelaws project. Set the secret via repository Settings → Secrets.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Typecheck
        run: yarn typecheck

      - name: Build
        run: yarn build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LEGALEAGLELAWS }}
          channelId: live
          projectId: legaleaglelaws
          target: legaleaglelaws-docs
